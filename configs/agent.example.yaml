    #       value: 30s

    # # --- Kubernetes Data Source ---
    # # Collects resource definitions and status from a Kubernetes cluster.
    # - type: kubernetes
    #   name: k8s-cluster-1
    #   desc: "Main Kubernetes Cluster"
    #   config:
    #     # Set to "true" if the agent is running inside the cluster (In-Cluster Config).
    #     # Set to "false" if using a kubeconfig file.
    #     - name: in_cluster
    #       value: "false"
    #
    #     # Path to the kubeconfig file (only used if in_cluster is "false").
