coordimap:
  # The API Key used to authenticate the agent with the Coordimap platform.
  # You can provide the key directly as a string, or reference an environment variable
  # using the ${VAR_NAME} syntax.
  api_key: ${COORDIMAP_API_KEY}

  # A list of data sources that the agent will collect data from.
  # You can configure multiple data sources of different types here.
  # Uncomment the sections below to enable specific data sources.
  data_sources:
    # # --- AWS Data Source ---
    # # Collects inventory and configuration data from an AWS account.
    # - type: aws
